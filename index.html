          h("button", { onClick: function() { if (histIdx < hist.length - 1) setHistDay(hist[histIdx + 1].date); }, disabled: histIdx >= hist.length - 1,
            style: { background: "none", border: "none", color: histIdx >= hist.length - 1 ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.5)", cursor: histIdx >= hist.length - 1 ? "default" : "pointer" } }, h(IconChevL, { size: 24 }))),
        h("div", { style: { display: "flex", gap: 16, alignItems: "center" } },
          (hd.p + hd.c + hd.f) > 0 ? h(DonutChart, { p: hd.p, c: hd.c, f: hd.f, size: 120, ir: 34, or2: 54 })
          : h("div", { style: { width: 120, height: 120, display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,0.1)", fontSize: 12 } }, "\u05d0\u05d9\u05df \u05de\u05d0\u05e7\u05e8\u05d5"),
          h("div", { style: { flex: 1, display: "flex", flexDirection: "column", gap: 6 } },
            h(MLRow, { c: "#60a5fa", l: "\u05d7\u05dc\u05d1\u05d5\u05df", g: hd.p }),
            h(MLRow, { c: "#fbbf24", l: "\u05e4\u05d7\u05de\u05d9\u05de\u05d5\u05ea", g: hd.c }),
            h(MLRow, { c: "#f472b6", l: "\u05e9\u05d5\u05de\u05df", g: hd.f }),
            h("div", { style: { borderTop: "1px solid " + BORD, paddingTop: 8, marginTop: 4, display: "flex", flexDirection: "column", gap: 4 } },
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12 } },
                h("span", { style: { color: "rgba(255,255,255,0.3)" } }, "\u05d0\u05db\u05dc\u05ea\u05d9"),
                h("span", { style: { color: "rgba(255,255,255,0.7)", fontWeight: 700 } }, hd.eaten)),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12 } },
                h("span", { style: { color: "rgba(255,255,255,0.3)" } }, "\u05e9\u05e8\u05e4\u05ea\u05d9"),
                h("span", { style: { color: "#fb923c", fontWeight: 700 } }, hd.burned)))))) : null);
  }

  // Saved screen
  function SavedScreen() {
    return h("div", { style: { display: "flex", flexDirection: "column", gap: 16 } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
        h("h1", { style: { fontSize: 28, fontWeight: 900, margin: 0, letterSpacing: -1 } }, "\u05de\u05e0\u05d5\u05ea \u05e9\u05de\u05d5\u05e8\u05d5\u05ea"),
        h("button", { onClick: function() { setModal("addsaved"); }, style: { background: "#4f46e5", border: "none", borderRadius: "50%", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#fff" } }, h(IconPlus, { size: 18 }))),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        saved.length === 0 ? h("div", { style: { textAlign: "center", color: "rgba(255,255,255,0.15)", padding: "48px 0" } }, "\u05d0\u05d9\u05df \u05de\u05e0\u05d5\u05ea \u05e9\u05de\u05d5\u05e8\u05d5\u05ea \u05e2\u05d3\u05d9\u05d9\u05df") :
        saved.map(function(m) {
          return h(EntryRow, { key: m.id, title: m.name,
            sub: m.protein ? ("\u05d7\u05dc\u05f3 " + Math.round(m.protein) + "g \u00b7 \u05e4\u05d7\u05f3 " + Math.round(m.carbs) + "g \u00b7 \u05e9\u05d5\u05de\u05df " + Math.round(m.fat) + "g") : "",
            val: m.calories + " \u05e7\u05e7\u05f4\u05dc",
            onDel: function() { deleteSaved(m.id); } });
        })));
  }

  return h("div", { dir: "rtl", style: { minHeight: "100vh", background: BG, color: "#fff" } },
    h("div", { style: { maxWidth: 520, margin: "0 auto", padding: "16px 16px 96px" } },
      screen === "today" ? h(TodayScreen, null) : null,
      screen === "history" ? h(HistoryScreen, null) : null,
      screen === "saved" ? h(SavedScreen, null) : null,
      screen === "settings" ? h(SettingsScreen, { settings: settings, onSave: saveSettings }) : null),
    h(BottomNav, { screen: screen, setScreen: setScreen }),
    modal ? h("div", { style: { position: "fixed", inset: 0, zIndex: 50, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "flex-end", justifyContent: "center" }, onClick: closeModal },
      h("div", { style: { width: "100%", maxWidth: 520, background: "#0d1117", borderTop: "1px solid " + BORD, borderRadius: "24px 24px 0 0", padding: "20px 20px 40px", maxHeight: "88vh", overflowY: "auto" }, onClick: function(e) { e.stopPropagation(); } },
        modal === "food" ? h(FoodModal, { saved: saved, onAdd: addMeal, onClose: closeModal }) : null,
        modal === "burn" ? h(BurnModal, { onAdd: addBurn, onClose: closeModal }) : null,
        modal === "addsaved" ? h(AddSavedModal, { onAdd: addSaved, onClose: closeModal }) : null,
        modal === "edit" && editTarget ? h(EditModal, { type: editTarget.type, item: editTarget.item, onSave: editTarget.type === "meal" ? updateMeal : updateBurn, onClose: closeModal }) : null,
        modal === "recommend" ? h(RecommendModal, { remaining: remaining, protein: todayP, carbs: todayC, fat: todayF, onAdd: function(m) { return addMeal(m, false); }, onClose: closeModal }) : null)) : null);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CalTrack));
</script>
