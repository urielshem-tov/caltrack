    return h("div", { style: { display: "flex", flexDirection: "column", gap: 16 } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
        h("h1", { style: { fontSize: 28, fontWeight: 900, margin: 0, letterSpacing: -1 } }, "\u05de\u05e0\u05d5\u05ea \u05e9\u05de\u05d5\u05e8\u05d5\u05ea"),
        h("button", { onClick: function() { setModal("addsaved"); }, style: { background: "#4f46e5", border: "none", borderRadius: "50%", width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#fff" } }, h(IconPlus, { size: 18 }))),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        saved.length === 0 ? h("div", { style: { textAlign: "center", color: "rgba(255,255,255,0.15)", padding: "48px 0" } }, "\u05d0\u05d9\u05df \u05de\u05e0\u05d5\u05ea \u05e9\u05de\u05d5\u05e8\u05d5\u05ea \u05e2\u05d3\u05d9\u05d9\u05df") :
        saved.map(function(m) {
          return h(EntryRow, { key: m.id, title: m.name,
            sub: m.protein ? ("\u05d7\u05dc\u05f3 " + Math.round(m.protein) + "g \u00b7 \u05e4\u05d7\u05f3 " + Math.round(m.carbs) + "g \u00b7 \u05e9\u05d5\u05de\u05df " + Math.round(m.fat) + "g") : "",
            val: m.calories + " \u05e7\u05e7\u05f4\u05dc",
            onDel: function() { deleteSaved(m.id); } });
        })));
  }

  return h("div", { dir: "rtl", style: { minHeight: "100vh", background: "transparent", color: "#fff" } },
    h("div", { className: "app-shell" },
      screen === "today" ? h(TodayScreen, null) : null,
      screen === "history" ? h(HistoryScreen, null) : null,
      screen === "saved" ? h(SavedScreen, null) : null,
      screen === "settings" ? h(SettingsScreen, { settings: settings, onSave: saveSettings }) : null),
    h(BottomNav, { screen: screen, setScreen: setScreen }),
    modal ? h("div", { style: { position: "fixed", inset: 0, zIndex: 50, background: "rgba(6,9,18,0.72)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", justifyContent: "center" }, onClick: closeModal },
      h("div", { style: { width: "100%", maxWidth: 520, background: "linear-gradient(180deg,#141a2e,#0f1424)", borderTop: "1px solid rgba(255,255,255,0.12)", borderRadius: "26px 26px 0 0", boxShadow: "0 -20px 60px rgba(0,0,0,0.5)", padding: "18px 18px calc(28px + env(safe-area-inset-bottom))", maxHeight: "88vh", overflowY: "auto" }, onClick: function(e) { e.stopPropagation(); } },
        modal === "food" ? h(FoodModal, { saved: saved, onAdd: addMeal, onClose: closeModal, initialTab: initialFoodTab }) : null,
        modal === "burn" ? h(BurnModal, { onAdd: addBurn, onClose: closeModal, weight: settings.weight }) : null,
        modal === "addsaved" ? h(AddSavedModal, { onAdd: addSaved, onClose: closeModal }) : null,
        modal === "edit" && editTarget ? h(EditModal, { type: editTarget.type, item: editTarget.item, onSave: editTarget.ctx === "history" ? (editTarget.type === "meal" ? updateMealHist : updateBurnHist) : (editTarget.type === "meal" ? updateMeal : updateBurn), onClose: closeModal }) : null,
        modal === "recommend" ? h(RecommendModal, { remaining: remaining, protein: todayP, carbs: todayC, fat: todayF, goal: settings.goal, proteinRem: proteinRem, onAdd: function(m) { return addMeal(m, false); }, onClose: closeModal }) : null)) : null);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CalTrack));
</script>
